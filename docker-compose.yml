services:
  db:
    image: postgres:15.3-alpine
    container_name: keltech-desafio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keltech_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0.5
    container_name: keltech-desafio-redis
    environment:
      REDIS_PASSWORD: your_redis_password
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:6.0.5
    container_name: keltech-desafio-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: keltech_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  db_data:
  mongo_data:
